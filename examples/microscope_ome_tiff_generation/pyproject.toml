[project]
name = "microscope-ome-tiff"
version = "0.1.0"
description = "Links OME-XML metadata generated by Zaber Launcher with image files to create an OME-TIFF file"
requires-python = ">=3.13"
dependencies = [
    "click>=8.4.1",
    "ome-types>=0.6.3",
    "pillow>=12.2.0",
    "tifffile>=2026.5.2",
]

[dependency-groups]
dev = [
    "ruff~=0.14.0",
    "pyright>=1.1.0",
]

[tool.ruff]
extend = "../../tools/tooling_config/zaber-ruff.toml"

[tool.ruff.lint]
extend-ignore = [
    "D100",  # Do not require docstrings in public module
    "D103",  # Do not require docstrings in public functions
    "D107",  # Do not require docstrings in __init__
    "TRY003", # Allow long exception messages that are not defined in the exception class itself
]

[tool.pyright]
extends = "../../tools/tooling_config/zaber-pyright.toml"
