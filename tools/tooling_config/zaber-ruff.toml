# Do not edit this file. It is provided by Zaber's Programming Standards Committee.
#
# To upgrade to a newer version of the configuration from the committee, replace
# this file with the lastest released file found at
# https://gitlab.izaber.com/prog-std/python-tooling-config
#
# Version: UNPUBLISHED

# The required version of Ruff compatible with this configuration.
required-version = "~=0.14.0"

# This is a default max line length.
# It is largely a matter of team taste and can be modified.
line-length = 100

[format]
# Format python code snippets in comments
docstring-code-format = true

[lint]
# Use all lint rules, incorporating new rules as they are made.
# It is expected that projects pin their tools' versions (by committing their
# uv.lock file) so new rules will only be incorporated when the version is
# explicitly changed.
select = [
	# Rule     Explanation for selecting
	"ALL",     # Enable all non-preview, non-conflicting rules
	"D204",    # Require empty line after class docstring (PEP 257)
	"D401",    # Require imperative mood doc strings (PEP 257)
	"D404",    # Do not start doc strings with "This function..." (PEP 257)
]
ignore = [
	# Rule     Explanation for ignoring
	"COM812",  # Do not lint trailing commas in multi-line lists, etc.
	           # Not required when also using `ruff format`.

	"EM",      # Allow strings in error constructors to reduce verbosity
	"FIX002",  # Allow TODO comments
	"G003",    # Do not require %-formatting in logging calls
	"G004",    # Allow f-strings in logging calls
	"PD008",   # Allow the use of pandas.Dataframe.at()
	"PERF401", # Do not force list comprehensions
	"PERF403", # Do not force dictionary comprehensions
	"RET505",  # Allow superfluous else branches
	"RUF023",  # Do not require __slots__ to be sorted
	"S310",    # Allow constructing arbitrary URLs for urllib.urlopen
	           # (we do not have many security concerns internally)
	"S311",    # Allow random.random()-like calls
	           # (we do not have many security concerns internally)
	"S603",    # Allow subprocesses without shells
	           # (risk internally is low and test is prone to false-positives)
	"S607",    # Allow relative paths in subprocess calls
	           # (risk internally is low)
	"SIM108",  # Do not always force ternary operator
	"T20",     # Allow print/pprint calls (often used in scripts)
	"TC001",   # Do not require typechecking import block
	"TC002",   # Do not require typechecking import block
	"TC003",   # Do not require typechecking import block
	"TD002",   # Do not require author in TODO comment
	"TD003",   # Do not require ticket link in TODO comment
]

# Follow Google's documentation convention, with some changes to bring
# it closer to PEP 257 (see selected rules above).
pydocstyle.convention = "google"

[lint.per-file-ignores]
"tests/**.py" = [
	# Rule     Explanation for ignoring
	"S101",    # Allow `assert` in tests
	"D104",    # Do not require module-level documentation in tests
]
