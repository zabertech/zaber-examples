name: Check Examples
run-name: ${{ github.actor }} running GitHub Actions on check-examples.yml
on: [workflow_dispatch, pull_request]
jobs:
  check-example-directories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.9
        uses: actions/setup-python@v3
        with:
          python-version: "3.9"
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"
      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - id: inspect-examples
        name: Inspect Examples
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user --upgrade pipenv==2024.0.2
          python3 -m pip install --user --upgrade pdm
          cd tools/check_examples
          npm install
          uv sync --locked --dev
          uv run check all
      - name: Upload lock files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lock-files
          path: |
            examples/**/Pipfile.lock
            examples/**/pdm.lock
            examples/**/uv.lock
